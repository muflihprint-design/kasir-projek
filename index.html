/* Style Tombol Aktif di Menu Lainnya */
.action-btn-active {
  background-color: #ffffff !important;
  transform: scale(0.95);
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05) !important;

/* Garis bawah indikator untuk tombol aktif */
.action-btn-active::after {
  content: '';

  height: 3px;

    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.8);
      z-index: 9999;
      backdrop-filter: blur(2px);
      align-items: center;

      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2563eb;
      border-radius: 50%;

    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    
    /* Modal Styles */
   /* Modal Styles Terbaru */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
   align-items: start;  /* Mengubah posisi dari 'end' ke 'start' */
  justify-content: center;
  padding-top: 20px;   /* Memberi jarak sedikit dari atas layar ponsel */
}

.modal-content {
  background: white;
  width: 95%;          /* Memberi sedikit ruang di kiri-kanan */
  max-width: 28rem;
  border-radius: 24px;  /* Membuat semua sudut membulat */
  max-height: 85vh;
  overflow-y: auto;
  animation: slideDown 0.3s ease-out; /* Menggunakan animasi meluncur ke bawah */
  display: flex;
  flex-direction: column;
}

    /* Menghilangkan scrollbar tapi tetap bisa di-scroll (Opsional, agar lebih bersih) */
#modalContent::-webkit-scrollbar {
  display: none;
}
#modalContent {
  -ms-overflow-style: none;  /* IE and Edge */
  scrollbar-width: none;     /* Firefox */
  
  /* GANTI 'smooth' MENJADI 'auto' UNTUK MENGHAPUS EFEK MELUNCUR */
  scroll-behavior: auto !important; 
  
  /* Memastikan momentum scroll di iOS tetap enak */
  -webkit-overflow-scrolling: touch; 
  
}

/* Animasi baru agar modal muncul dari atas */
@keyframes slideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

       /* CSS UNTUK CETAK (PRINT) */
.animate-spin {
    animation: spin 1s linear infinite;
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  
 
@media print {
  @page {
    /* Menjaga printer thermal memotong kertas secara otomatis sesuai panjang isi */
    size: auto;
    margin: 0;
  }

  body {
    margin: 0 !important;
    padding: 0 !important;
    background: white;
    /* Memastikan body bertindak sebagai flex container untuk memposisikan nota di tengah */
    display: flex !important;
    justify-content: center !important;
    align-items: flex-start !important;
  }

  body > *:not(#printArea) {
    display: none !important;
  }

  #printArea {

display: block !important;
  width: 380px !important; 
  height: auto !important; 
  background: white;
  margin: 0 auto !important;

  box-shadow: none !important;

}

   async function refreshData() {
  showBalanceLoading(true);
  
  try {
    const res = await fetch(`${WEB_APP_URL}?action=getBalances&_=${Date.now()}`);
    const data = await res.json();

    // LANGSUNG isi dengan data asli agar tidak terlihat teks "Rp 0"
    const totalBalanceEl = document.getElementById('total-balance');

    if (totalBalanceEl) totalBalanceEl.innerText = formatRupiah(data.cash + data.bank);
    if (saldoCashEl) saldoCashEl.innerText = formatRupiah(data.cash);
    if (saldoRekeningEl) saldoRekeningEl.innerText = formatRupiah(data.bank);

  } catch (e) {
    console.error("Gagal refresh data:", e);
    showBalanceLoading(false);
    
    // Opsional: Jika gagal, coba hitung dari memori lokal (allTransactions) sebagai cadangan
    if (typeof updateBalanceDisplay === 'function') updateBalanceDisplay();
  }
}

function handleModalScroll() {
  const content = document.getElementById('modalContent');
  const indicator = document.getElementById('scroll-indicator');
  
  if (!content || !indicator) return;

  // Rumus: Total tinggi konten - Jarak yang sudah discroll - Tinggi kotak yang terlihat
  const scrollRemaining = content.scrollHeight - content.scrollTop - content.clientHeight;

  // Jika sisa konten di bawah lebih dari 20px, tampilkan ikon
  if (scrollRemaining > 30) {
    indicator.classList.remove('opacity-0', 'scale-75');
    indicator.classList.add('opacity-100', 'scale-100');
  } else {
    indicator.classList.remove('opacity-100', 'scale-100');
    indicator.classList.add('opacity-0', 'scale-75');
  }
}
    


/** * Fungsi untuk mengupdate angka saldo secara real-time
 * Panggil ini setelah data transaksi berhasil dimuat
 */
function updateBalanceUI(total, cash, bank) {
  // Pastikan loading sudah dimatikan
  const checkElement = document.getElementById('total-balance-value');
  if (!checkElement) showBalanceLoading(false);

  const totalEl = document.getElementById('total-balance-value');
  const cashEl = document.getElementById('cash-balance-value');
  const bankEl = document.getElementById('bank-balance-value');

  if (totalEl) totalEl.innerText = formatRupiah(total);
  if (cashEl) cashEl.innerText = formatRupiah(cash);
  if (bankEl) bankEl.innerText = formatRupiah(bank);
}

async function refreshData() {
  showBalanceLoading(true);
  
  try {
    const res = await fetch(`${WEB_APP_URL}?action=getBalances&_=${Date.now()}`);
    const data = await res.json();

    // Matikan loading & gambar struktur asli
    showBalanceLoading(false);

    // Sekarang ID sudah ada di DOM, kita isi datanya
    const elTotal = document.getElementById('total-balance');
    const elCash = document.getElementById('saldo-cash');
    const elRekening = document.getElementById('saldo-rekening');

    const cashValue = Number(data.cash) || 0;
    const bankValue = Number(data.bank) || 0;

    if (elTotal) elTotal.innerText = formatRupiah(cashValue + bankValue);
    if (elCash) elCash.innerText = formatRupiah(cashValue);
    if (elRekening) elRekening.innerText = formatRupiah(bankValue);

  } catch (e) {
    console.error("Gagal refresh data:", e);
    showBalanceLoading(false);
  }
}

  function closeModal() {
  const modal = document.getElementById('general-modal');
  const content = document.getElementById('modalContent');

    content.innerHTML = ''; // Kosongkan agar tidak ada ID ganda

    modal.style.display = ''; 
  }

}

async function fetchTransactions() {
  if (isDataLoaded && allTransactions.length > 0) {
    renderTransactions();
    return;
  }

  showLoading(true);
  try {
    const res = await fetch(`${WEB_APP_URL}?action=getTransactions&_=${Date.now()}`);
    const newData = await res.json();
    
    // Simpan semua data yang didapat ke memori
    allTransactions = newData;
    isDataLoaded = true;
    
     renderTransactions();
    
  } catch (e) {
    console.error("Error Detail:", e);
    document.getElementById('listContainer').innerHTML = 
      `<div class="p-8 text-center text-red-500 font-bold">Gagal sinkron data. Pastikan internet stabil.</div>`;
  } finally {
    showLoading(false);
  }
}


    function setCategory(cat) {
      currentCategory = cat;
      const categories = ['SEMUA', 'MASUK', 'KELUAR'];
      categories.forEach(c => {
        const el = document.getElementById(`cat-${c.toLowerCase()}`);
        if (el) el.className = (c === cat) ? "flex-1 py-2 border-b-2 border-blue-500 text-blue-600 bg-white font-bold transition" : "flex-1 py-2 border-b-2 border-transparent hover:bg-gray-50 transition";
      });
      renderTransactions();
    }

  function renderTransactions() {
  const container = document.getElementById('listContainer');
  const searchInput = document.getElementById('searchInput');
  const dateStartInput = document.getElementById('f-date-start');
  const dateEndInput = document.getElementById('f-date-end');

  const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
  const ds = dateStartInput ? dateStartInput.value : '';
  const de = dateEndInput ? dateEndInput.value : '';
  
  container.innerHTML = '';

  const filtered = allTransactions.filter(t => {
    // 1. Filter Tab Metode
    if (currentView !== 'Semua' && t.metode !== currentView) return false;
    
    // 2. Filter Kategori
    if (currentCategory !== 'SEMUA' && t.tipe !== currentCategory) return false;
    
    // 3. Filter Rentang Tanggal
    const tDate = t.waktu.split(' ')[0];
    if (ds && tDate < ds) return false;
    if (de && tDate > de) return false;

    // 4. Ambil data nama produk dari detail (JSON)
    let productNames = "";
    try {
      if (t.detail) {
        const items = typeof t.detail === 'string' ? JSON.parse(t.detail) : t.detail;
        if (Array.isArray(items)) {
          productNames = items.map(item => (item.nama || "").toLowerCase()).join(" ");
        }
      }
    } catch (e) {
      console.warn("Gagal parse detail pada ID: " + t.id, e);
    }

    // 5. Eksekusi Pencarian
    const matchesSearch = 
      t.id.toLowerCase().includes(searchTerm) || 
      t.ket.toLowerCase().includes(searchTerm) || 
      (t.sub && t.sub.toLowerCase().includes(searchTerm)) ||
      productNames.includes(searchTerm); 
    
    return matchesSearch;
  });

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="p-12 text-center">
        <div class="text-gray-300 mb-2"><i data-lucide="search-x" class="w-12 h-12 mx-auto"></i></div>
        <p class="text-gray-400 italic text-sm">Tidak ada transaksi ditemukan</p>
      </div>`;
    lucide.createIcons();
    return;
  }

  // Render Item
  filtered.forEach(t => {
    const isMasuk = t.tipe === 'MASUK';
    const amount = isMasuk ? t.masuk : t.keluar;
    
    const [tgl, wkt] = t.waktu.split(' ');
    const jamMenit = wkt.substring(0, 5);

    const div = document.createElement('div');
    div.className = `p-4 bg-white border-b border-slate-50 hover:bg-slate-50 cursor-pointer flex justify-between items-center border-l-4 ${isMasuk ? 'border-l-green-500' : 'border-l-red-500'} active:scale-[0.98] transition-all`;
    
    div.onclick = () => showDetail(t);
    
    div.innerHTML = `
      <div class="flex-1 pr-4">
        <div class="flex items-center gap-2 mb-0.5">
          <p class="text-[10px] text-gray-400 font-mono">${t.id}</p>
          <span class="text-[10px] text-slate-300">•</span>
          <p class="text-[10px] text-slate-500 font-semibold">${tgl}</p>
        </div>
        <p class="font-bold text-sm text-slate-800 leading-tight">${t.ket}</p>
        <div class="flex items-center gap-2 mt-1.5">
          <span class="text-[9px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-bold uppercase">${t.kat}</span>
          <span class="text-[10px] text-gray-400 font-medium flex items-center gap-1">
            <i data-lucide="clock" class="w-2.5 h-2.5"></i> ${jamMenit}
          </span>
          </div>
      </div>
      <div class="text-right">
        <p class="font-black text-sm ${isMasuk ? 'text-green-600' : 'text-red-600'}">
          ${isMasuk ? '+' : '-'} ${formatRupiah(amount)}
        </p>
        <p class="text-[9px] text-gray-400 uppercase font-bold tracking-tighter">${t.metode}</p>
      </div>
    `;
    container.appendChild(div);
  });
  
  lucide.createIcons();
}
    
  async  function setFilter(f) {
  currentFilter = f;
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const date = String(now.getDate()).padStart(2, '0');
  const monthStr = String(month + 1).padStart(2, '0');

  // String untuk tanggal hari ini (YYYY-MM-DD)
  const todayStr = `${year}-${monthStr}-${date}`;

  // 1. Update UI Tombol (Toggle Warna)
  ['today', 'month', 'all'].forEach(type => {
    const el = document.getElementById('f-' + type);
    if (el) {
      el.className = (f === type) ? 
        'px-3 py-1 bg-blue-600 text-white rounded-full transition' : 
        'px-3 py-1 bg-gray-100 rounded-full hover:bg-gray-200 transition';
    }
  });

  // 2. Logika Pengisian Input Tanggal
  if (f === 'today') {
    document.getElementById('f-date-start').value = todayStr;
    document.getElementById('f-date-end').value = todayStr;
  } else if (f === 'month') {
    document.getElementById('f-date-start').value = `${year}-${monthStr}-01`;
    document.getElementById('f-date-end').value = todayStr;
  } else if (f === 'all') {
    document.getElementById('f-date-start').value = '';
    document.getElementById('f-date-end').value = '';
  }
// 3. LOGIKA TARIK DATA OTOMATIS
  // Jika pilih 'month' atau 'all' DAN belum pernah tarik data penuh
  if ((f === 'month' || f === 'all') && !isFullDataLoaded) {
    await fetchFullTransactions();
  } else {
    renderTransactions();
  }
}

async function fetchFullTransactions() {
  showLoading(true);
  try {
    // Panggil tanpa parameter range=today untuk mengambil semua data
    const res = await fetch(`${WEB_APP_URL}?action=getTransactions&_=${Date.now()}`);
    const data = await res.json();
    
    allTransactions = data; // Ganti cache dengan data lengkap
    isFullDataLoaded = true; // Tandai bahwa data sudah lengkap
    isDataLoaded = true;
    
    renderTransactions();
  } catch (e) {
    alert("Gagal menarik data riwayat lengkap");
  } finally {
    showLoading(false);
  }
}

async function checkManualDateChange() {
  // Jika user ubah tanggal manual dan data belum lengkap, tarik semua data
  if (!isFullDataLoaded) {
    await fetchFullTransactions();
  } else {
    renderTransactions();
  }
}

  const rowId = currentTargetInputId.split('-')[1];

if (typeof activeTab !== 'undefined' && activeTab === 'pembelian') {

     } else {
  if (priceUmum || priceReseller) {

    );

  }}
 closeProductModal();

}

async function openProductModal(inputId) {
    currentTargetInputId = inputId;
    const modal = document.getElementById('product-modal');
    if (modal) {
        modal.style.display = 'flex';
        if (productMaster.length === 0) {
            showLoading(true);
            await fetchMasterStock();
            showLoading(false);
        }
        const searchInput = document.getElementById('modal-search');
        if (searchInput) {
            searchInput.value = '';
            searchInput.focus();
        }
        filterProducts();
    }
}

window.openProductModal = openProductModal;
window.selectProduct = selectProduct;


    function selectManual() {
      const query = document.getElementById('modal-search').value.toUpperCase();
      if (query) selectProduct(query, 0);
    }

    function maskNominal(el) {
      let val = el.value.replace(/\D/g, "");
      if (val === "") { el.value = ""; return; }
      el.value = Number(val).toLocaleString('id-ID');
    }

    function unmask(val) {
      if (!val) return 0;
      let clean = val.toString().replace("Rp ", "").replace(/\./g, "");
      return parseFloat(clean) || 0;
    }

    function calcTotal() {
      const items = document.querySelectorAll('[id^="item-"]');
      let subtotal = 0;
      items.forEach(item => {
        const qty = parseFloat(item.querySelector('.qty-input').value) || 0;
        const price = unmask(item.querySelector('.item-price').value);
        subtotal += (qty * price);
      });

      // Penjualan
      const elDisc = document.getElementById('p_disc');
      const elDpPenjualan = document.getElementById('p_dp');
      const elTotalRaw = document.getElementById('p_total_raw');
      const elFinalPenjualan = document.getElementById('p_final');
      if (elFinalPenjualan) {
        const disc = elDisc ? unmask(elDisc.value) : 0;
        const dp = elDpPenjualan ? unmask(elDpPenjualan.value) : 0;
        const final = subtotal - disc;
        const sisa = final - dp;
        if (elTotalRaw) elTotalRaw.innerText = "Rp " + new Intl.NumberFormat('id-ID').format(subtotal);
        elFinalPenjualan.innerText = "Rp " + new Intl.NumberFormat('id-ID').format(final);
        const statusPiutang = document.getElementById('p_status_piutang');
        if (statusPiutang) {
            if (sisa > 0) {
              statusPiutang.innerText = "Sisa Piutang: Rp " + new Intl.NumberFormat('id-ID').format(sisa);
              statusPiutang.className = "text-[10px] mt-1 text-red-500 font-bold italic";
            } else if (sisa < 0) {
              statusPiutang.innerText = "Kembalian: Rp " + new Intl.NumberFormat('id-ID').format(Math.abs(sisa));
              statusPiutang.className = "text-[10px] mt-1 text-blue-600 font-bold italic";
            } else {
              statusPiutang.innerText = "Lunas";
              statusPiutang.className = "text-[10px] mt-1 text-green-600 font-bold italic";
            }
        }
      }

      // Pembelian
      const elFinalPembelian = document.getElementById('b_final');
      if (elFinalPembelian) elFinalPembelian.innerText = "Rp " + new Intl.NumberFormat('id-ID').format(subtotal);
    }

 function collectItems() {
  const itemsData = [];
  document.querySelectorAll('[id^="item-"]').forEach(el => {
    const inputNama = el.querySelector('.item-name');
    if (!inputNama) return;
    
    const nama = inputNama.value.replace(/,/g, '').toUpperCase();
    const harga = unmask(el.querySelector('.item-price').value);
    
    // 1. Ambil nilai Qty mentah dari input
    let qtyRaw = el.querySelector('.qty-input').value || "1";
    
    // 2. Bersihkan input: Ubah koma (,) menjadi titik (.) agar bisa diproses parseFloat
    let qtyClean = qtyRaw.toString().replace(',', '.');
    
    // 3. Konversi ke angka desimal murni
    let qtyFinal = parseFloat(qtyClean) || 0;

    const kategori = (el.querySelector('.item-category').value.replace(/,/g, '').toUpperCase()) || "-";

    if (nama && nama !== "PILIH BARANG STOK...") {
      itemsData.push({
        nama: nama,
        qty: qtyFinal, // Mengirim angka valid ke JSON
        harga: harga,

      });

  });

   async function runScript(actionName, payload, stayInTab) {
  const btn = document.querySelector('button[onclick*="save"]');
  if (btn) btn.disabled = true;
  showLoading(true);

  try {
    // HAPUS mode: "no-cors" agar bisa membaca respon JSON
    const response = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const result = await response.json();

    if (result.status === 'success') {
      // Masukkan data baru ke memori agar riwayat langsung terupdate
      if (result.data && typeof allTransactions !== 'undefined') {
        allTransactions.unshift(result.data);
      }

      // Reset flag agar fetch selanjutnya mengambil data terbaru
      isDataLoaded = false;
      isFullDataLoaded = false;

      // Berikan feedback instan tanpa menunggu 1.2 detik penuh
      showLoading(false);
      if (btn) btn.disabled = false;
      
      // Pindah ke tab riwayat agar user melihat datanya sudah masuk
      changeTab('riwayat');
      
      // Refresh background data
      refreshData();
      fetchMasterStock();
    } else {
      throw new Error(result.message || "Gagal menyimpan");
    }

  } catch (err) {
    showLoading(false);
    if (btn) btn.disabled = false;
    // Jika masih gagal baca JSON karena CORS, minimal kita paksa refresh setelah jeda
    console.error("Fetch error:", err);
    setTimeout(() => {
       location.reload(); 
    }, 1000);
  }
}

function savePenjualan() {
  const items = collectItems();
  if(items.length === 0) return alert("Pilih barang terlebih dahulu!");
  
  // --- ATURAN KHUSUS: TARIK DANA SHOPEE ---
  const shopeeItems = items.filter(item => 
    item.nama.toLowerCase().includes("tarik dana shopee")
  );

  if (shopeeItems.length > 0) {
    if (items.length > 1) {
      return alert("Transaksi 'Tarik Dana Shopee' tidak boleh digabung dengan barang lain!");
    }
    
    if (shopeeItems[0].qty > 1) {
      return alert("Jumlah (Qty) untuk 'Tarik Dana Shopee' maksimal hanya 1!");
    }
  }
  // ----------------------------------------

  // --- VALIDASI METODE PEMBAYARAN ---
  const selectedRadio = document.querySelector('input[name="payment-method"]:checked');
  if (!selectedRadio) {
    return alert("Silahkan pilih Metode Pembayaran (Cash atau Rekening) terlebih dahulu!");
  }

  // --- VALIDASI & AMBIL OPSI KETERANGAN CEPAT (Wajib Pilih) ---
  const selectedKetOpt = document.querySelector('input[name="p_ket_opt"]:checked');
  
  // Menghilangkan fallback "Penjualan Ke" dan mewajibkan pilihan
  if (!selectedKetOpt) {
    return alert("Silahkan pilih Keterangan (Blangko, Cetak Undangan, atau Lain-lain) terlebih dahulu!");
  }
  
  const ketPilihan = selectedKetOpt.value; 
  // ------------------------------------------------------------

  const shopInitial = currentShop.nama ? currentShop.nama.charAt(0).toUpperCase() : '?';
  const inputPelanggan = (document.getElementById('p_cust').value || 'UMUM').toUpperCase();
  const pelangganFormatted = `${inputPelanggan} (${shopInitial})`;
  
  // Kirim nilai pilihan ke payload agar diproses server menjadi "Pelanggan - Keterangan"
  let keteranganOtomatis = ketPilihan;

  // OVERRIDE UNTUK SHOPEE: Menyesuaikan aturan pelunasan piutang Shopee
  const shopee1 = items.find(item => item.nama.toLowerCase() === "tarik dana shopee1");
  const shopee2 = items.find(item => item.nama.toLowerCase() === "tarik dana shopee2");

  if (shopee1) {
    keteranganOtomatis = "Tarik Dana Shopee1";
  } else if (shopee2) {
    keteranganOtomatis = "Tarik Dana Shopee2";
  }

  const payload = {
    action: 'processTransaction',
    type: 'PENJUALAN',
    pelanggan: pelangganFormatted,
    ket: keteranganOtomatis,
    items: items,
    diskon: unmask(document.getElementById('p_disc').value),
    dp: unmask(document.getElementById('p_dp').value),
    metode: selectedRadio.value 
  };
  
  payload.total = items.reduce((a, b) => a + (b.qty * b.harga), 0);
  runScript('processTransaction', payload, 'penjualan');
}

async function eksekusiPelunasanUtang(id, nominal) {
  // --- VALIDASI & PENGAMBILAN METODE (Update Baru) ---
  // Mencari radio button yang dipilih dalam grup 'pay-utang-method'
  const selectedRadio = document.querySelector('input[name="pay-utang-method"]:checked');
  
  if (!selectedRadio) {
    return alert("Silahkan pilih Metode Pembayaran terlebih dahulu!");
  }
  
  const metode = selectedRadio.value;
  // --------------------------------------------------

  // Mengambil nama supplier dari elemen display di modal
  // Pastikan di HTML bayarUtang, elemen nama supplier memiliki class ini atau sesuaikan selector-nya
  const elSupplier = document.querySelector('.modal-supplier-name') || { innerText: 'Supplier' };
  const namaSupplier = elSupplier.innerText;

  // DEFINISIKAN payload
  const payload = {
    action: 'processTransaction',
    type: 'BAYAR_UTANG',
    idUtang: id,
    nominal: nominal,
    metode: metode,
    ket: `Pelunasan Utang: ${namaSupplier}` 
  };
  
  // Sembunyikan modal
  closeModal(); 
  
  try {
    // Jalankan runScript menggunakan payload yang sudah didefinisikan
    await runScript('processTransaction', payload, 'riwayat');
    
    // Refresh list utang jika fungsi tersedia agar sisa utang langsung terupdate di layar
    if (typeof fetchUtangList === 'function') {
      fetchUtangList();
    }
  } catch (error) {
    console.error("Gagal eksekusi utang:", error);
    alert("Terjadi kesalahan saat memproses pelunasan.");
  }
}

    async function saveBayarPiutang(id, sisa) {
  const namaAsli = document.getElementById('pi_nama_display')?.innerText || 'PELANGGAN';
  
  // Ambil elemen radio yang terpilih
  const selectedRadio = document.querySelector('input[name="pi-method"]:checked');
  const noShopee = document.getElementById('pi_shope_ref').value;

  // Validasi: Harus pilih metode
  if (!selectedRadio) {
    return alert("Silahkan pilih Metode Penerimaan (Cash, Transfer, atau Shopee)!");
  }

  const metodePilihan = selectedRadio.value;

  // Validasi: Jika Shopee, nomor referensi wajib diisi
  if (metodePilihan === 'Shopee' && !noShopee) {
    return alert("Untuk metode Shopee, No. Transaksi wajib diisi!");
  }

  // Gabungkan nama jika via Shopee
  let namaPelanggan = namaAsli;
  if (metodePilihan === 'Shopee' && noShopee) {
    namaPelanggan = `${namaAsli} - ${noShopee}`;
  }

  const payload = { 
    action: 'processTransaction', 
    type: 'BAYAR_PIUTANG', 
    idPiutang: id, 
    nominal: sisa, 
    metode: metodePilihan,
    pelanggan: namaPelanggan // Kirim nama yang sudah dimodifikasi
  };
  
  closeModal(); 
  await runScript('processTransaction', payload, 'riwayat');
}

async function shareNotaJPG(id, event) {
 // 1. Pastikan mencari di variabel yang benar (allTransactions atau currentTransactions)
  const t = (typeof allTransactions !== 'undefined' ? allTransactions : currentTransactions).find(item => item.id === id);
  if (!t) return alert("Data transaksi tidak ditemukan!");

  // 2. Ambil referensi tombol secara aman
  const btn = event ? event.currentTarget : null;
  const originalText = btn ? btn.innerHTML : '';
  
  if (btn) {
    btn.innerHTML = '<div class="loader w-4 h-4 border-2 border-white mr-2 inline-block animate-spin"></div> Memproses';
    btn.disabled = true;
  }
  const printArea = document.getElementById('printArea');
  printArea.innerHTML = generateNotaHTML(t);
  printArea.classList.remove('hidden');

  try {
    // Beri waktu browser merender font & layout
    await new Promise(resolve => setTimeout(resolve, 300));

    const canvas = await html2canvas(printArea, {
      scale: 3, // Skala 3 agar gambar sangat tajam saat di-zoom di WA
      useCORS: true,
      backgroundColor: "#ffffff",
      width: 380,
      windowWidth: 380,
      logging: false
    });

    const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
    const blob = await (await fetch(dataUrl)).blob();
    
    // Memberikan nama file yang unik agar tidak tertukar di cache HP
    const fileName = `Nota_${t.id}_${Date.now()}.jpg`;
    const file = new File([blob], fileName, { type: "image/jpeg" });

    // Cek apakah browser mendukung sharing file
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: 'Nota Blimi',
        text: `Nota transaksi #${t.id} - Blimi`
      });
    } else {
      // Fallback: Jika tidak bisa share, maka download otomatis
      const link = document.createElement('a');
      link.download = fileName;
      link.href = dataUrl;
      link.click();
      alert("Browser Anda tidak mendukung share langsung. File telah diunduh.");
    }
  } catch (err) {
    console.error("Gagal share:", err);
    alert("Maaf, terjadi kesalahan saat memproses gambar.");
  } finally {
    // Kembalikan tombol ke semula
    btn.innerHTML = originalText;
    btn.disabled = false;
    printArea.classList.add('hidden');
  }
}

function printNota(id) {
  const t = currentTransactions.find(item => item.id === id);
  if (!t) return;

  const printArea = document.getElementById('printArea');
  
  // Set konten nota
  printArea.innerHTML = generateNotaHTML(t);
  
  // Pastikan elemen terlihat di DOM sebelum perintah print
  printArea.classList.remove('hidden');

  setTimeout(() => {
    window.print();
    // Setelah print selesai (atau dibatalkan), sembunyikan kembali
    printArea.classList.add('hidden');
  }, 300);
}

function downloadExcel() {
    try {
        // 1. Ambil Parameter Filter dari UI (dengan proteksi jika elemen null)
        const dsInput = document.getElementById('f-date-start');
        const deInput = document.getElementById('f-date-end');
        const searchInput = document.getElementById('searchInput');

        const ds = dsInput ? dsInput.value : '';
        const de = deInput ? deInput.value : '';
        const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';

        // 2. Gunakan allTransactions (disesuaikan dengan variabel di fungsi render Anda)
        if (typeof allTransactions === 'undefined' || allTransactions.length === 0) {
            return alert("Data transaksi belum dimuat atau kosong.");
        }

        // 3. Logika Filter (disamakan dengan logika renderTransactions agar hasil konsisten)
        const filteredData = allTransactions.filter(t => {
            // Filter Tab Metode
            if (currentView !== 'Semua' && t.metode !== currentView) return false;
            
            // Filter Kategori/Tipe
            if (currentCategory !== 'SEMUA' && t.tipe !== currentCategory) return false;
            
            // Filter Rentang Tanggal
            const tDate = t.waktu.split(' ')[0];
            if (ds && tDate < ds) return false;
            if (de && tDate > de) return false;

            // Filter Pencarian (Cek Ket, Sub/Pelanggan, dan ID)
            const ket = (t.ket || "").toLowerCase();
            const sub = (t.sub || "").toLowerCase();
            const id = (t.id || "").toLowerCase();
            
            return ket.includes(searchTerm) || sub.includes(searchTerm) || id.includes(searchTerm);
        });

        if (filteredData.length === 0) return alert("Tidak ada data hasil filter untuk diunduh.");

        let excelRows = [];
        let summaryMap = {};

        // 4. Susun Baris Data
        filteredData.forEach(t => {
            const diskonTotal = parseFloat(t.diskon) || 0;
            const kategori = (t.kat || 'LAIN-LAIN').toUpperCase().trim();
            
            if (!summaryMap[kategori]) {
                summaryMap[kategori] = { Masuk: 0, Keluar: 0, Diskon: 0, Net: 0 };
            }

            // Cek apakah ada detail produk
            let detailItems = [];
            try {
                detailItems = typeof t.detail === 'string' ? JSON.parse(t.detail) : (t.detail || []);
            } catch (e) { 
                detailItems = []; 
            }

            if (detailItems.length > 0) {
                detailItems.forEach((item, index) => {
                    const subItem = (parseFloat(item.qty) || 0) * (parseFloat(item.harga) || 0);
                    const dRow = index === 0 ? diskonTotal : 0; // Diskon hanya di baris pertama
                    const netRow = subItem - dRow;

                    excelRows.push({
                        'Waktu': t.waktu, 'ID': t.id, 'Kategori': t.kat, 'Pelanggan': t.sub, 'Barang': item.nama,
                        'Qty': parseFloat(item.qty), 'Harga Satuan': parseFloat(item.harga), 'Subtotal': subItem,
                        'Diskon': dRow, 'Total Net': netRow, 'Metode': t.metode, 'Ket': t.ket
                    });

                    if (t.tipe === 'MASUK') summaryMap[kategori].Masuk += subItem;
                    else summaryMap[kategori].Keluar += subItem;
                    summaryMap[kategori].Diskon += dRow;
                    summaryMap[kategori].Net += netRow;
                });
            } else {
                const nom = parseFloat(t.masuk || t.keluar) || 0;
                const netRow = nom - diskonTotal;
                excelRows.push({
                    'Waktu': t.waktu, 'ID': t.id, 'Kategori': t.kat, 'Pelanggan': t.sub, 'Barang': '-',
                    'Qty': 1, 'Harga Satuan': nom, 'Subtotal': nom, 'Diskon': diskonTotal, 'Total Net': netRow,
                    'Metode': t.metode, 'Ket': t.ket
                });
                if (t.tipe === 'MASUK') summaryMap[kategori].Masuk += nom;
                else summaryMap[kategori].Keluar += nom;
                summaryMap[kategori].Diskon += diskonTotal;
                summaryMap[kategori].Net += netRow;
            }
        });

        // 5. Buat File Excel
        let summaryRows = Object.keys(summaryMap).map(kat => ({
            'Kategori': kat,
            'Total Masuk': summaryMap[kat].Masuk,
            'Total Keluar': summaryMap[kat].Keluar,
            'Total Diskon': summaryMap[kat].Diskon,
            'Total Bersih (Net)': summaryMap[kat].Net
        }));

        const labelKategori = currentCategory === 'SEMUA' ? 'SEMUA TRANSAKSI' : currentCategory;
        const fileName = `Laporan_${labelKategori}_${ds || 'Awal'}_sd_${de || 'Akhir'}.xlsx`;
        const workbook = XLSX.utils.book_new();

        /** SHEET 1: DETAIL **/
        const wsDetail = XLSX.utils.aoa_to_sheet([
            [`LAPORAN DETAIL TRANSAKSI`],
            [`Periode: ${ds || '-'} s/d ${de || '-'} | Kategori: ${labelKategori}`],
            []
        ]);
        XLSX.utils.sheet_add_json(wsDetail, excelRows, { origin: "A4" });
        autoFitColumns(wsDetail, excelRows);
        formatRupiahExcel(wsDetail, [5, 6, 7, 8, 9], 4);
        XLSX.utils.book_append_sheet(workbook, wsDetail, "Detail Transaksi");

        /** SHEET 2: RINGKASAN **/
        const wsSummary = XLSX.utils.aoa_to_sheet([
            [`RINGKASAN KATEGORI`],
            [`Periode: ${ds || '-'} s/d ${de || '-'}`],
            []
        ]);
        XLSX.utils.sheet_add_json(wsSummary, summaryRows, { origin: "A4" });
        autoFitColumns(wsSummary, summaryRows);
        formatRupiahExcel(wsSummary, [1, 2, 3, 4], 4);
        XLSX.utils.book_append_sheet(workbook, wsSummary, "Ringkasan Kategori");

        XLSX.writeFile(workbook, fileName);

    } catch (error) {
        console.error("Excel Error:", error);
        alert("Gagal mengunduh Excel: " + error.message);
    }
}

function autoFitColumns(worksheet, jsonData) {
    if (!jsonData.length) return;
    const objectMaxLength = [];
    const keys = Object.keys(jsonData[0]);
    keys.forEach((key) => { objectMaxLength.push(key.length + 5); });
    jsonData.forEach((row) => {
        keys.forEach((key, index) => {
            const value = row[key] ? row[key].toString() : "";
            if (value.length + 2 > objectMaxLength[index]) {
                objectMaxLength[index] = value.length + 2;
            }
        });
    });
    worksheet['!cols'] = objectMaxLength.map(w => ({ wch: w }));
}

function formatRupiahExcel(worksheet, cols, dataStartRow = 1) {
    if (!worksheet['!ref']) return;
    const range = XLSX.utils.decode_range(worksheet['!ref']);
    for (let R = dataStartRow; R <= range.e.r; ++R) {
        cols.forEach(colIdx => {
            const cell = worksheet[XLSX.utils.encode_cell({ r: R, c: colIdx })];
            if (cell && typeof cell.v === 'number') {
                cell.t = 'n';
                cell.z = '#,##0'; 
            }
        });
    }
}
